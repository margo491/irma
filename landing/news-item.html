<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IrMa — Новости</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink:    #f2c4ce;
      --pink-d:  #d98a9a;
      --green:   #8fa87c;
      --green-l: #c8d9be;
      --bg:      #fdf6f7;
      --white:   #ffffff;
      --dark:    #3a3a3a;
      --gray:    #7a7a7a;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--dark); }

    nav:not(.footer-nav) { position: sticky; top: 0; z-index: 100; background: rgba(246,238,235,.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--pink); display: flex; align-items: center; justify-content: space-between; padding: 0 5vw; height: 64px; }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo-img { height: 44px; width: auto; display: block; }
    .nav-links { display: flex; gap: 14px; align-items: center; }
    .nav-links a { text-decoration: none; color: var(--gray); font-size: .77rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; transition: color .2s; white-space: nowrap; }
    .nav-links a:hover { color: var(--pink-d); }
    .nav-links a.nav-active { color: var(--pink-d); font-weight: 700; }
    .btn-order { background: var(--green); color: var(--white) !important; padding: 9px 20px; border-radius: 30px; font-size: .77rem; font-weight: 600 !important; transition: background .2s, transform .15s !important; white-space: nowrap; }
    .btn-order:hover { background: #7a956a !important; transform: translateY(-1px); }
    .btn-cart { display: inline-flex; align-items: center; gap: 6px; background: var(--pink-d); color: var(--white) !important; padding: 9px 16px; border-radius: 30px; font-size: .77rem; font-weight: 600 !important; border: none; cursor: pointer; letter-spacing: .04em; transition: background .2s, transform .15s; font-family: 'Montserrat', sans-serif; white-space: nowrap; }
    .btn-cart:hover { background: #c07080 !important; transform: translateY(-1px); }
    .cart-badge { background: var(--white); color: var(--pink-d); border-radius: 50%; width: 19px; height: 19px; font-size: .7rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
    .nav-burger { display: none; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--dark); padding: 4px; line-height: 1; }

    /* ARTICLE */
    .article-section { padding: 48px 5vw 80px; }
    .article { max-width: 720px; margin: 0 auto; background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .article-img { width: 100%; max-height: 640px; object-fit: contain; background: linear-gradient(135deg, var(--pink) 0%, var(--green-l) 100%); display: block; }
    .article-video { width: 100%; max-height: 480px; display: block; background: #000; }
    .article-img-placeholder { width: 100%; height: 260px; background: linear-gradient(135deg, var(--pink) 0%, var(--green-l) 100%); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
    .article-body { padding: 36px 40px 44px; }
    .article-tag { font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--green); margin-bottom: 12px; }
    .article-title { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 3.5vw, 2.1rem); font-style: italic; color: var(--dark); margin-bottom: 16px; line-height: 1.3; }
    .article-text { font-size: .95rem; color: var(--gray); line-height: 1.8; font-weight: 300; white-space: pre-line; }
    .article-date { font-size: .78rem; color: #bbb; margin-top: 26px; letter-spacing: .04em; }
    .article-loading, .article-error { text-align: center; color: var(--gray); font-size: .9rem; padding: 60px 0; }

    .back-link { display: block; text-align: center; margin-top: 32px; font-size: .82rem; color: var(--gray); text-decoration: none; }
    .back-link:hover { color: var(--pink-d); }

    /* FOOTER */
    footer { background: var(--dark); color: rgba(255,255,255,.5); padding: 36px 5vw 24px; font-size: .78rem; }
    .footer-inner { max-width: 960px; margin: 0 auto; }
    .footer-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 24px; margin-bottom: 28px; }
    .footer-brand-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.4rem; color: var(--white); display: block; margin-bottom: 4px; }
    .footer-tagline { color: rgba(255,255,255,.4); font-size: .76rem; }
    .footer-nav { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
    .footer-nav a { color: rgba(255,255,255,.5); text-decoration: none; font-size: .75rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; transition: color .2s; }
    .footer-nav a:hover { color: rgba(255,255,255,.9); }
    .footer-bottom { border-top: 1px solid rgba(255,255,255,.1); padding-top: 20px; text-align: center; }

    @media (max-width: 768px) {
      .nav-burger { display: block; }
      .nav-links { position: fixed; top: 64px; left: 0; right: 0; background: rgba(253,246,247,.98); backdrop-filter: blur(8px); flex-direction: column; align-items: flex-start; gap: 14px; padding: 20px 5vw; display: none; border-bottom: 1px solid var(--pink); z-index: 99; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: .9rem; }
      .article-body { padding: 28px 22px 32px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html"><img src="logo.jpg" alt="IrMa by Marinich" class="nav-logo-img"></a>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Главная</a>
    <a href="menu.html">Меню</a>
    <a href="services.html">Услуги</a>
    <a href="training.html">Обучение</a>
    <a href="news.html" class="nav-active">Новости</a>
    <a href="contacts.html">Контакты</a>
    <button class="btn-cart" onclick="window.location='menu.html'">🛒 <span class="cart-badge" id="cart-count">0</span></button>
    <a href="https://web.max.ru/-71665082178843" target="_blank" class="btn-order">Заказать</a>
  </div>
  <button class="nav-burger" onclick="document.getElementById('nav-links').classList.toggle('open')">☰</button>
</nav>

<!-- ARTICLE -->
<section class="article-section">
  <div class="article" id="article">
    <p class="article-loading">Загрузка…</p>
  </div>
  <a href="news.html" class="back-link">← Ко всем новостям</a>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-top">
      <div>
        <span class="footer-brand-name">IrMa</span>
        <span class="footer-tagline">Семейное кафе by Marinich</span>
      </div>
      <nav class="footer-nav">
        <a href="index.html">Главная</a>
        <a href="menu.html">Меню</a>
        <a href="services.html">Услуги</a>
        <a href="training.html">Обучение</a>
        <a href="news.html">Новости</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
    <div class="footer-bottom">© 2025 IrMa. Все права защищены.</div>
  </div>
</footer>

<script>
(function() {
  try {
    var cart = JSON.parse(localStorage.getItem('irma_cart') || '{}');
    var total = Object.values(cart).reduce(function(s,v){ return s+(v.qty||0); }, 0);
    document.getElementById('cart-count').textContent = total;
  } catch(e) {}
})();

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

var articleEl = document.getElementById('article');
var newsId = new URLSearchParams(window.location.search).get('id');

if (!newsId) {
  articleEl.innerHTML = '<p class="article-error">Новость не найдена.</p>';
} else {
  fetch('/news/' + encodeURIComponent(newsId))
    .then(function(res) {
      if (!res.ok) { throw new Error('not found'); }
      return res.json();
    })
    .then(function(n) {
      document.title = 'IrMa — ' + n.title;
      var media;
      if (n.video_path) {
        media = '<video class="article-video" controls playsinline' +
          (n.image_path ? ' poster="' + n.image_path + '"' : '') +
          '><source src="' + n.video_path + '" type="video/mp4"></video>';
      } else if (n.image_path) {
        media = '<img class="article-img" src="' + n.image_path + '" alt="' + escapeHtml(n.title) + '">';
      } else {
        media = '<div class="article-img-placeholder">📰</div>';
      }
      var date = new Date(n.published_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
      articleEl.innerHTML = media +
        '<div class="article-body">' +
          '<p class="article-tag">' + escapeHtml(n.tag) + '</p>' +
          '<h1 class="article-title">' + escapeHtml(n.title) + '</h1>' +
          '<p class="article-text">' + escapeHtml(n.text) + '</p>' +
          '<p class="article-date">' + date + '</p>' +
        '</div>';
    })
    .catch(function() {
      articleEl.innerHTML = '<p class="article-error">Новость не найдена.</p>';
    });
}
</script>
</body>
</html>
